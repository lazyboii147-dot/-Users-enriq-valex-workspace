name: Auto Sync Workspace (Node24)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (Node24 compatible)
        uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Safe merge from remote
        run: |
          git pull origin main --allow-unrelated-histories || true

      - name: Stage workspace changes
        run: git add -A

      - name: Commit changes if needed
        run: |
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Auto-sync workspace (Node24)"
          fi

      - name: Push changes
        run: git push origin main
